<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eid Animation</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="scene">

  <!-- Clouds -->
  <div class="cloud c1"></div>
  <div class="cloud c2"></div>
  <div class="cloud c3"></div>

  <!-- Character -->
  <div class="character">

    <!-- Body -->
    <div class="body"></div>

    <!-- Backpack -->
    <div class="bag"></div>

    <!-- Head -->
    <div class="head"></div>

    <!-- Arm + binocular -->
    <div class="arm">
      <div class="binocular"></div>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
