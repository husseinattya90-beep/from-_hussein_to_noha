<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: linear-gradient(#fde68a, #fbbf24);
  overflow: hidden;
}

/* البنت */
.girl {
  position: absolute;
  left: 20%;
  bottom: 200px;
  animation: look 2s infinite alternate ease-in-out;
}

@keyframes look {
  from { transform: rotate(-5deg); }
  to { transform: rotate(5deg); }
}

/* المنظار */
.telescope {
  transform-origin: left;
  animation: zoom 2s infinite alternate;
}

@keyframes zoom {
  from { transform: scaleX(1); }
  to { transform: scaleX(1.1); }
}

/* الشخص */
.guy {
  position: absolute;
  right: 15%;
  bottom: 200px;
  opacity: 0;
  transform: translateY(50px);
  transition: 1s;
}

/* اليافطة */
.sign {
  fill: white;
  stroke: black;
  stroke-width: 2;
}

.text {
  font-size: 18px;
  font-weight: bold;
  text-anchor: middle;
}
</style>
</head>

<body>

<!-- بنت كرتون -->
<svg class="girl" width="150" height="150" viewBox="0 0 100 100">
  <!-- جسم -->
  <circle cx="50" cy="40" r="20" fill="#ffb6c1"/>
  
  <!-- المنظار -->
  <rect class="telescope" x="60" y="35" width="30" height="6" fill="black"/>
</svg>

<!-- الشخص + اليافطة -->
<svg class="guy" id="guy" width="200" height="200" viewBox="0 0 120 120">
  
  <!-- الجسم -->
  <circle cx="60" cy="50" r="20" fill="#60a5fa"/>

  <!-- اليافطة -->
  <rect class="sign" x="10" y="70" width="100" height="35" rx="10"/>
  
  <text x="60" y="90" class="text">
    kol sana w enty tayeba
  </text>
  
  <text x="60" y="105" class="text">
    Happy Eid 🎉
  </text>

</svg>

<script>
setTimeout(()=>{
  document.getElementById("guy").style.opacity = "1";
  document.getElementById("guy").style.transform = "translateY(0)";
},2000);
</script>

</body>
</html>
