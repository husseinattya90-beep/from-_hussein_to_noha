<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<style>

body{
margin:0;
font-family:"Courier New", monospace;
background:#0f0f14;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:90%;
max-width:700px;
height:80vh;
background:#1b1b22;
border-radius:14px;
padding:25px;
box-shadow:0 10px 40px rgba(0,0,0,0.5);
overflow-y:auto;
scroll-behavior:smooth;
}

img{
width:100%;
border-radius:12px;
margin-bottom:25px;
}

#text{
font-size:18px;
line-height:1.7;
white-space:pre-wrap;
}

.cursor{
display:inline-block;
width:8px;
height:20px;
background:white;
margin-left:4px;
animation:blink 1s infinite;
}

@keyframes blink{
0%{opacity:1}
50%{opacity:0}
100%{opacity:1}
}

</style>
</head>

<body>

<div class="container" id="box">

<img src="./grateful.png" alt="grateful">

<div id="text"></div><span class="cursor"></span>

</div>

<script>

const message = `I just wanted to say thank you.

Thank you for staying with me while I was feeling down, for listening to me even when I didn’t know how to explain what I was feeling.

Thank you for trying so hard to pull me out of that mood, joking with me, telling stories just to make me laugh, and not giving up on making me feel better.

You might think it was something small, but for me it meant a lot. More than you can imagine.

Honestly, I didn’t expect to ever feel this comfortable opening my heart to someone the way I do with you.

Being able to talk to you and feel understood and lighter afterwards is something really special to me.

So thank you… for your patience, your kindness, and for simply being you.

You made a hard moment much easier, and I’m really grateful for that.`;

let i = 0;
const speed = 35;

function typeWriter(){

if(i < message.length){

document.getElementById("text").innerHTML += message.charAt(i);
i++;

let box = document.getElementById("box");
box.scrollTop = box.scrollHeight;

setTimeout(typeWriter, speed);

}

}

typeWriter();

</script>

</body>
</html>
