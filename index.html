<script>

const message = `I kept thinking about our conversation yesterday.

Somewhere in the middle of our joking, I think I took your words in a different direction. I'm not even sure why. Maybe for a moment I felt like I had to explain my way of thinking.

And maybe, without noticing, I put a small wall there for a second.

But the truth is… when I look at the bigger picture of us lately, it doesn’t feel like walls at all.

If anything, it feels like the opposite.

It feels like two people who are so comfortable with each other that even the small disagreements don’t shake anything.

Somewhere along the way, you became a place that feels a little like home to me.

And honestly, that kind of calm… that kind of peace… is a little mind-blowing.

I think this is the answer I found.

And maybe that’s exactly why I act the way I do sometimes.`

let i = 0
let speed = 90

const sound = new Audio("typewriter.mp3")

function typeWriter(){

if(i < message.length){

document.getElementById("text").innerHTML += message.charAt(i)

sound.currentTime = 0
sound.play()

i++

setTimeout(typeWriter, speed)

}

}

typeWriter()

</script>
