<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Noha</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:black;
font-family:"Courier New", monospace;
overflow:hidden;
color:white;
}

/* الخلفية */

.background{
position:fixed;
width:100%;
height:100%;
background-image:url("46024a7c5f55139bf3c04a695fd684c0.jpg");
background-size:cover;
background-position:center;
animation:zoom 40s infinite alternate;
z-index:-2;
}

@keyframes zoom{
from{transform:scale(1);}
to{transform:scale(1.1);}
}

/* النجوم */

.stars{
position:fixed;
width:100%;
height:100%;
background:url("https://www.transparenttextures.com/patterns/stardust.png");
opacity:0.4;
animation:moveStars 120s linear infinite;
z-index:-1;
}

@keyframes moveStars{
from{background-position:0 0;}
to{background-position:1000px 1000px;}
}

/* النص */

.textBox{
max-width:900px;
padding:40px;
text-align:center;
}

#text{
font-size:48px;
line-height:1.8;
white-space:pre-wrap;
text-shadow:
0 0 10px rgba(0,0,0,0.9),
0 0 25px rgba(0,0,0,0.9);
}

/* المؤشر */

.cursor{
display:inline-block;
width:4px;
height:45px;
background:white;
margin-left:6px;
animation:blink 1s infinite;
}

@keyframes blink{
0%{opacity:1}
50%{opacity:0}
100%{opacity:1}
}

/* اهتزاز خفيف */

@keyframes shake{
0%{transform:translate(0px,0px)}
25%{transform:translate(1px,-1px)}
50%{transform:translate(-1px,1px)}
75%{transform:translate(1px,1px)}
100%{transform:translate(0px,0px)}
}

.typing{
animation:shake 0.08s;
}

</style>
</head>

<body>

<div class="background"></div>
<div class="stars"></div>

<div class="textBox">
<span id="text"></span><span class="cursor"></span>
</div>

<script>

const message = `I kept thinking about our conversation yesterday.

Somewhere in the middle of our joking, I think I took your words in a different direction.

Maybe for a moment I felt like I had to explain my way of thinking.

But the truth is… when I look at the bigger picture of us lately, it doesn’t feel like walls at all.

It feels like two people who are so comfortable with each other that even the small disagreements don’t shake anything.

Somewhere along the way, you became a place that feels a little like home to me.`

let i = 0
let speed = 110

const typingSound = new Audio("typewriter.mp3")
const dingSound = new Audio("ding.mp3")

function typeWriter(){

if(i < message.length){

let textElement = document.getElementById("text")

textElement.innerHTML += message.charAt(i)

textElement.classList.add("typing")
setTimeout(()=>textElement.classList.remove("typing"),80)

typingSound.currentTime = 0
typingSound.play().catch(()=>{})

if(message.charAt(i) === "\n"){
dingSound.play().catch(()=>{})
}

i++

setTimeout(typeWriter, speed)

}

}

document.body.addEventListener("click",()=>{
typeWriter()
},{once:true})

</script>

</body>
</html>
